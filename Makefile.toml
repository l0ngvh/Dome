[tasks.fmt]
command = "cargo"
args = ["fmt", "--", "--check"]

[tasks.clippy]
clear = true
command = "cargo"
args = ["clippy", "--tests"]

[tasks.test]
clear = true
command = "cargo"
args = ["test", "--lib"]

[tasks.audit]
command = "cargo"
args = ["audit"]

[tasks.deny]
command = "cargo"
args = ["deny", "check"]

[tasks.ci]
dependencies = ["fmt", "clippy", "test", "deny"]

[tasks.coverage]
clear = true
script_runner = "@shell"
script = '''
cargo +nightly llvm-cov test --lib --branch --lcov --output-path lcov.info
'''

[tasks.coverage-html]
clear = true
command = "cargo"
toolchain = "nightly"
args = ["llvm-cov", "test", "--lib", "--branch", "--html", "--open"]

[tasks.e2e-coverage]
clear = true
env = { "RUSTUP_TOOLCHAIN" = "nightly", "RUSTFLAGS" = "-C instrument-coverage -Zcoverage-options=branch --cfg=coverage --cfg=trybuild_no_target", "CARGO_LLVM_COV" = "1", "CARGO_LLVM_COV_TARGET_DIR" = "${CARGO_MAKE_WORKING_DIRECTORY}/target", "LLVM_PROFILE_FILE" = "${CARGO_MAKE_WORKING_DIRECTORY}/target/dome-%p-%11m.profraw" }
script_runner = "@shell"
script = '''
cargo llvm-cov clean --workspace
cargo test --lib
cargo test --test e2e -- --test-threads=1
cargo llvm-cov report --branch --json
'''

[tasks.e2e]
command = "cargo"
args = ["test", "--test", "e2e", "--", "--test-threads=1", "${@}"]

[tasks.leak-check]
description = "Run leak check"
run_task = [
    { name = "leak-check-macos", condition = { platforms = ["mac"] } },
]

[tasks.leak-check-macos]
private = true
script_runner = "@shell"
script = '''
cargo build
MallocStackLogging=1 ./target/debug/dome &
PID=$!
sleep 3
echo "Dome running (PID: $PID)"
echo ""
echo "=== Initial heap snapshot ==="
heap $PID --showSizes > /tmp/heap1.txt
head -50 /tmp/heap1.txt
echo ""
echo "Use the app, then press Enter to take second snapshot..."
read
echo "=== Second heap snapshot ==="
heap $PID --showSizes > /tmp/heap2.txt
head -50 /tmp/heap2.txt
echo ""
echo "=== Stack traces (top allocators) ==="
malloc_history $PID -callTree -invert -collapseRecursion > /tmp/malloc_history.txt
head -100 /tmp/malloc_history.txt
echo ""
echo "Files saved:"
echo "  /tmp/heap1.txt, /tmp/heap2.txt - heap snapshots"
echo "  /tmp/malloc_history.txt - full stack traces"
echo ""
echo "For specific type: malloc_history $PID NSRunningApplication"
./target/debug/dome exit 2>/dev/null || kill $PID 2>/dev/null || true
'''
