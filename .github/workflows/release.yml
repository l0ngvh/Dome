name: Release

on:
  push:
    tags:
      - "v*.*.*"
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches Cargo.toml version
        run: |
          CARGO_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $TAG_VERSION does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

  build-macos:
    needs: validate
    if: github.event_name == 'push'
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make
      - name: Import signing certificate
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERT_P12_BASE64" ]; then
            echo "No signing cert configured; release will be ad-hoc signed."
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/dome-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$MACOS_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null
          rm -f "$RUNNER_TEMP/cert.p12"
      - name: Build and bundle
        env:
          DOME_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: cargo make bundle -e BUNDLE_TARGET=${{ matrix.target }}
      - name: Verify code signature
        env:
          DOME_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          if [ -z "$DOME_SIGNING_IDENTITY" ]; then
            echo "::warning::No MACOS_SIGNING_IDENTITY; release is ad-hoc signed and TCC grants will not persist."
            exit 0
          fi
          codesign -dv --verbose=4 target/bundle/Dome.app 2>&1 | tee /tmp/codesign-out
          if ! grep -qF "Authority=$DOME_SIGNING_IDENTITY" /tmp/codesign-out; then
            echo "::error::Dome.app is not signed with '$DOME_SIGNING_IDENTITY'."
            exit 1
          fi
          codesign --verify --strict --verbose=2 target/bundle/Dome.app
      - name: Create DMG
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DMG_NAME="dome-${VERSION}-${{ matrix.target }}.dmg"
          mkdir -p dmg-staging
          cp -R target/bundle/Dome.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Dome" -srcfolder dmg-staging -ov -format UDZO "$DMG_NAME"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"
      - name: Create tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TAR_NAME="dome-${VERSION}-${{ matrix.target }}.tar.gz"
          tar -czf "$TAR_NAME" -C target/${{ matrix.target }}/release dome
          echo "TAR_NAME=$TAR_NAME" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: dome-${{ matrix.target }}
          path: |
            ${{ env.DMG_NAME }}
            ${{ env.TAR_NAME }}
      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/dome-signing.keychain-db" || true
          rm -f "$RUNNER_TEMP/cert.p12"

  build-windows:
    needs: validate
    if: github.event_name == 'push'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make
      - name: Install cargo-wix
        uses: taiki-e/install-action@v2
        with:
          # Latest stable as of writing (2026-04). Pinned to avoid
          # surprise breakage from new releases.
          tool: cargo-wix@0.3.9
      - name: Build and bundle
        shell: bash
        run: cargo make bundle
      - name: Rename MSI
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          MSI_SOURCE=$(find target/wix -name '*.msi' | head -1)
          if [ -z "$MSI_SOURCE" ]; then
            echo "::error::No .msi file found in target/wix/"
            exit 1
          fi
          MSI_NAME="dome-${VERSION}-x86_64-pc-windows-msvc.msi"
          mv "$MSI_SOURCE" "$MSI_NAME"
          echo "MSI_NAME=$MSI_NAME" >> "$GITHUB_ENV"
      - name: Create portable zip
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ZIP_NAME="dome-${VERSION}-x86_64-pc-windows-msvc.zip"
          7z a "$ZIP_NAME" ./target/release/dome.exe ./target/release/dome.pdb
          echo "ZIP_NAME=$ZIP_NAME" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: dome-windows
        path: |
          ${{ env.MSI_NAME }}
          ${{ env.ZIP_NAME }}

  publish:
    needs: [build-macos, build-windows]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Generate SHA256 checksums
        run: |
          sha256sum dome-*.dmg dome-*.tar.gz dome-*.msi dome-*.zip > checksums-sha256.txt
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          gh release create "v${VERSION}" \
            --draft \
            --title "Dome v${VERSION}" \
            --generate-notes \
            dome-*.dmg \
            dome-*.tar.gz \
            dome-*.msi \
            dome-*.zip \
            checksums-sha256.txt

  dispatch:
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          gh release download "$GITHUB_REF_NAME" \
            --pattern "dome-${VERSION}-aarch64-apple-darwin.dmg" \
            --pattern "dome-${VERSION}-x86_64-pc-windows-msvc.zip"
      - name: Compute SHAs
        id: shas
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha_aarch64_dmg=$(sha256sum dome-${VERSION}-aarch64-apple-darwin.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha_zip=$(sha256sum dome-${VERSION}-x86_64-pc-windows-msvc.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Dispatch Homebrew
        continue-on-error: true
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.RELEASE_DISPATCH_TOKEN }}
          repository: l0ngvh/homebrew-dome
          event-type: new-release
          client-payload: '{"version": "${{ steps.shas.outputs.version }}", "sha_aarch64_dmg": "${{ steps.shas.outputs.sha_aarch64_dmg }}"}'
      - name: Dispatch Scoop
        continue-on-error: true
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.RELEASE_DISPATCH_TOKEN }}
          repository: l0ngvh/scoop-dome
          event-type: new-release
          client-payload: '{"version": "${{ steps.shas.outputs.version }}", "sha_zip": "${{ steps.shas.outputs.sha_zip }}"}'
