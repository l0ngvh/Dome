name: release-nightly

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - name: check-head
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          HEAD_SHA=$(git rev-parse HEAD)
          LAST_SHA=$(gh release view nightly --json body -q .body 2>/dev/null \
            | grep -oE 'sha=[a-f0-9]{40}$' | head -1 | cut -d= -f2 || true)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ -z "$LAST_SHA" ] || [ "$HEAD_SHA" != "$LAST_SHA" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: build-${{matrix.target}}
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: dome-nightly-x86_64-pc-windows-msvc.zip
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: dome-nightly-aarch64-apple-darwin.dmg

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{matrix.target}}

      - name: install cargo-make
        run: cargo install cargo-make --locked

      - name: import-signing-cert
        if: matrix.os == 'macos-latest'
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERT_P12_BASE64" ]; then
            echo "No signing cert configured; nightly will be ad-hoc signed."
            exit 0
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/dome-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$MACOS_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: build-windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cargo build --release --target ${{matrix.target}}
          Compress-Archive -Force "target/${{matrix.target}}/release/dome.exe","target/${{matrix.target}}/release/dome.pdb" ${{matrix.artifact}}

      - name: build-macos
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          BUNDLE_TARGET: ${{matrix.target}}
          DOME_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          cargo build --release --target ${{matrix.target}}
          cargo make bundle
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          mv "target/Dome-${CARGO_VERSION}.dmg" "${{matrix.artifact}}"

      - name: verify-codesign
        if: matrix.os == 'macos-latest'
        env:
          DOME_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          if [ -z "$DOME_SIGNING_IDENTITY" ]; then
            echo "::warning::No MACOS_SIGNING_IDENTITY; nightly is ad-hoc signed and TCC grants will not persist."
            exit 0
          fi
          codesign -dv --verbose=4 target/bundle/Dome.app 2>&1 | tee /tmp/codesign-out
          if ! grep -qF "Authority=$DOME_SIGNING_IDENTITY" /tmp/codesign-out; then
            echo "::error::Dome.app is not signed with '$DOME_SIGNING_IDENTITY'."
            exit 1
          fi
          codesign --verify --strict --verbose=2 target/bundle/Dome.app

      - name: cleanup-keychain
        if: matrix.os == 'macos-latest' && always()
        run: |
          security delete-keychain "$RUNNER_TEMP/dome-signing.keychain-db" || true
          rm -f "$RUNNER_TEMP/cert.p12"

      - uses: actions/upload-artifact@v4
        with:
          name: dome-nightly-${{matrix.target}}
          path: ${{matrix.artifact}}

  publish:
    name: publish-nightly
    needs: [gate, build]
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: compute-sha
        id: sha
        run: |
          set -euo pipefail
          echo "sha_aarch64_dmg=$(sha256sum dist/dome-nightly-aarch64-apple-darwin/dome-nightly-aarch64-apple-darwin.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "sha_zip=$(sha256sum dist/dome-nightly-x86_64-pc-windows-msvc/dome-nightly-x86_64-pc-windows-msvc.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: compute-version
        id: version
        run: |
          set -euo pipefail
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          FULL_SHA=$(git rev-parse HEAD)
          DATE=$(date -u +%Y.%m.%d)
          echo "short_sha=$SHORT_SHA"     >> "$GITHUB_OUTPUT"
          echo "full_sha=$FULL_SHA"       >> "$GITHUB_OUTPUT"
          echo "date=$DATE"               >> "$GITHUB_OUTPUT"
          echo "version=$DATE.$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: create-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release delete nightly --cleanup-tag --yes || true
          gh release create nightly \
            --title "Dome Nightly ${{ steps.version.outputs.date }} (${{ steps.version.outputs.short_sha }})" \
            --notes "Nightly build at ${{ steps.version.outputs.date }} UTC. sha=${{ steps.version.outputs.full_sha }}" \
            --prerelease \
            --target "${{ steps.version.outputs.full_sha }}" \
            dist/dome-nightly-aarch64-apple-darwin/dome-nightly-aarch64-apple-darwin.dmg \
            dist/dome-nightly-x86_64-pc-windows-msvc/dome-nightly-x86_64-pc-windows-msvc.zip

      - name: dispatch-homebrew
        continue-on-error: true
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.RELEASE_DISPATCH_TOKEN }}
          repository: l0ngvh/homebrew-dome
          event-type: new-nightly-release
          client-payload: >-
            {"version": "${{ steps.version.outputs.version }}",
             "sha_aarch64_dmg": "${{ steps.sha.outputs.sha_aarch64_dmg }}",
             "sha_zip": "${{ steps.sha.outputs.sha_zip }}"}

      - name: dispatch-scoop
        continue-on-error: true
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ secrets.RELEASE_DISPATCH_TOKEN }}
          repository: l0ngvh/scoop-dome
          event-type: new-nightly-release
          client-payload: >-
            {"version": "${{ steps.version.outputs.version }}",
             "sha_aarch64_dmg": "${{ steps.sha.outputs.sha_aarch64_dmg }}",
             "sha_zip": "${{ steps.sha.outputs.sha_zip }}"}
