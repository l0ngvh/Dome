name: release-nightly

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build-${{matrix.target}}
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: dome-nightly-x86_64-pc-windows-msvc.zip
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: dome-nightly-aarch64-apple-darwin.dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: dome-nightly-x86_64-apple-darwin.dmg

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{matrix.target}}

      - name: install cargo-make
        run: cargo install cargo-make --locked

      - name: build-windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cargo build --release --target ${{matrix.target}}
          Compress-Archive -Force "target/${{matrix.target}}/release/dome.exe" ${{matrix.artifact}}

      - name: build-macos
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          BUNDLE_TARGET: ${{matrix.target}}
        run: |
          cargo build --release --target ${{matrix.target}}
          cargo make bundle
          mv target/Dome-0.1.0.dmg ${{matrix.artifact}}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Dome Nightly
          prerelease: true
          overwrite_files: true
          files: ${{matrix.artifact}}
          fail_on_unmatched_files: true
