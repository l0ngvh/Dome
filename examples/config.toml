# Dome configuration file
# Changes to this file are automatically reloaded (hot reload)

# Border size in pixels (default: 4.0)
border_size = 4.0

# Theme: one of "latte", "frappe", "macchiato", "mocha" (default: mocha)
theme = "mocha"

# Minimum window size - float for pixels, string for percentage (default: "5%")
min_width = 200     # 200 logical pixels
min_height = "10%"  # 10% of screen height

# Maximum window size - float for pixels, string for percentage (default: 0 = no limit)
# Windows that hit max constraints are centered within their allocated space
max_width = 800     # 800 logical pixels
max_height = "50%"  # 50% of screen height

# Log level filter (default: info)
# log_level = "debug"

# Launch Dome at login (macOS and Windows, default: false)
# start_at_login = false

# Font settings. Dome uses egui's built-in font stack (Ubuntu-Light
# proportional, Hack monospace, plus emoji fallbacks); only sizes are
# configurable. text_size drives body text (tab titles, picker rows);
# subtext_size drives the picker app-name subtext. Both must be in
# [4.0, 128.0].
[font]
text_size = 14.0
subtext_size = 12.0

# Tiling layout strategy. Both sub-tables are always parsed; `strategy` picks
# which one takes effect. Switching `strategy` and saving triggers a hot reload
# that discards the current tiling tree and re-attaches windows under the new
# strategy. Runtime-tuned master params get wiped on that reload.
[layout]
strategy = "partition_tree"   # or "master"

[layout.partition_tree]
tab_bar_height = 24.0       # height of the tab bar in tabbed containers, logical pixels
automatic_tiling = true            # pick split direction based on focused window dimensions

[layout.master]
master_ratio = 0.5          # width of the master area, in [0.1, 0.9]
master_count = 1            # number of master windows, >= 1

[keymaps]
"meta+0" = ["focus workspace 0"]
"meta+1" = ["focus workspace 1"]
"meta+2" = ["focus workspace 2"]
"meta+3" = ["focus workspace 3"]
"meta+4" = ["focus workspace 4"]
"meta+5" = ["focus workspace 5"]
"meta+6" = ["focus workspace 6"]
"meta+7" = ["focus workspace 7"]
"meta+8" = ["focus workspace 8"]
"meta+9" = ["focus workspace 9"]
"meta+shift+0" = ["move workspace 0"]
"meta+shift+1" = ["move workspace 1"]
"meta+shift+2" = ["move workspace 2"]
"meta+shift+3" = ["move workspace 3"]
"meta+shift+4" = ["move workspace 4"]
"meta+shift+5" = ["move workspace 5"]
"meta+shift+6" = ["move workspace 6"]
"meta+shift+7" = ["move workspace 7"]
"meta+shift+8" = ["move workspace 8"]
"meta+shift+9" = ["move workspace 9"]
"meta+e" = ["toggle spawn"]
"meta+d" = ["toggle direction"]
"meta+b" = ["toggle layout"]
"meta+p" = ["focus parent"]
"meta+h" = ["focus left"]
"meta+j" = ["focus down"]
"meta+k" = ["focus up"]
"meta+l" = ["focus right"]
"meta+[" = ["focus tab prev"]
"meta+]" = ["focus tab next"]
"meta+shift+h" = ["move left"]
"meta+shift+j" = ["move down"]
"meta+shift+k" = ["move up"]
"meta+shift+l" = ["move right"]
"meta+alt+h" = ["focus monitor left"]
"meta+alt+j" = ["focus monitor down"]
"meta+alt+k" = ["focus monitor up"]
"meta+alt+l" = ["focus monitor right"]
"meta+alt+shift+h" = ["move monitor left"]
"meta+alt+shift+j" = ["move monitor down"]
"meta+alt+shift+k" = ["move monitor up"]
"meta+alt+shift+l" = ["move monitor right"]
"meta+shift+f" = ["toggle float"]
"meta+shift+return" = ["toggle fullscreen"]
"meta+shift+q" = ["exit"]
"meta+return" = ["exec open -a Terminal"]
# "meta+m" = ["toggle minimized"]
# "meta+r" = ["mode resize"]

# Modal keybinding modes
# Define additional modes under [keymaps.mode.<name>].
# Always include a binding back to default mode to avoid getting stuck.
#
# [keymaps.mode.resize]
# "h" = ["master shrink"]
# "l" = ["master grow"]
# "j" = ["master more"]
# "k" = ["master fewer"]
# "escape" = ["mode default"]

