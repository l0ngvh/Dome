# Dome layout configuration file
# Lives next to config.toml. Contains only per-workspace layout overrides.

# Per-workspace overrides.
[[workspace]]
name = "3"
strategy = "master"
master_ratio = 0.5
master_count = 3
float = [
  { process = "calculator.exe" },
]
fullscreen = [
  { process = "slides.exe" },
]

[[workspace]]
name = "code"
strategy = "partition-tree"
tree = { split = "horizontal", children = [
  { process = "editor.exe" },
  { split = "vertical", children = [
    { process = "terminal.exe" },
    { process = "logs.exe" },
  ]},
  [
    { process = "terminal.exe" },
    { process = "logs.exe" },
  ]
]}
