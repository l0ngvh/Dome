[graph]
targets = [
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

[advisories]
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "0BSD",
    "ISC",
    "CC0-1.0",
    "OFL-1.1",
    "Unicode-3.0",
    "Ubuntu-font-1.0",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
